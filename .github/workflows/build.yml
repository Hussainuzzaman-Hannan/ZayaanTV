name: Build & Release Zayaan TV APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger বাটন

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Get version name
        id: version
        run: echo "VERSION=v1.0.$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Zayaan TV ${{ steps.version.outputs.VERSION }}"
          body: |
            ## 📺 Zayaan TV — লাইভ টিভি অ্যাপ

            ### ✅ এই ভার্সনে যা আছে:
            - 🇧🇩 বাংলাদেশি চ্যানেল (আকাশ DTH সহ)
            - 🇮🇳 ভারতীয় চ্যানেল
            - ☪️ ইসলামিক চ্যানেল
            - 📡 আন্তর্জাতিক চ্যানেল
            - ⚽ ফুটবল বিশ্বকাপ ২০২৬ চ্যানেল
            - ⭐ Favorites সিস্টেম
            - 🔍 রিয়েল-টাইম সার্চ
            - ▶️ Next/Previous/Pause কন্ট্রোল
            - 📐 Aspect Ratio Toggle (FIT/FILL/ZOOM)
            - 🔗 Custom M3U URL সাপোর্ট

            ### 📥 ইনস্টল করার নিয়ম:
            1. নিচে `ZayaanTV.apk` ডাউনলোড করুন
            2. ফোনে `Settings → Security → Unknown Sources` চালু করুন
            3. APK ইনস্টল করুন

            > ⚠️ এটি Debug APK — শুধু Android 5.0+ ফোনে কাজ করবে
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/ZayaanTV.apk

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZayaanTV-APK
          path: release/ZayaanTV.apk
          retention-days: 30